name: Build pymcu-avr-toolchain wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create GitHub Release after building"
        type: boolean
        default: false

jobs:
  # ---------------------------------------------------------------------------
  # Linux + Windows: single Docker run (Linux is prerequisite for Windows cross)
  # ---------------------------------------------------------------------------
  build-linux-windows:
    name: Build Linux x64 + Windows toolchains
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t avrgccbuild .

      - name: Run Docker build (Linux x64 + Windows x64 + Windows x86)
        run: |
          mkdir -p output
          docker run --rm \
            -v "${{ github.workspace }}/output:/output" \
            -e FOR_LINUX=1 \
            -e FOR_WINX64=1 \
            -e FOR_WINX86=1 \
            -e JOBCOUNT=4 \
            avrgccbuild

      - name: Verify Linux toolchain
        run: |
          LINUX_DIR=$(ls -d output/avr-gcc-*-x64-linux | head -1)
          echo "Found: $LINUX_DIR"
          $LINUX_DIR/bin/avr-gcc --version

      - name: Upload Linux x64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-linux-x64
          path: output/avr-gcc-*-x64-linux/
          retention-days: 1

      - name: Upload Windows x64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-win-x64
          path: output/avr-gcc-*-x64-windows/
          retention-days: 1

      - name: Upload Windows x86 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-win-x86
          path: output/avr-gcc-*-x86-windows/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon) — uses Homebrew avr-gcc
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    name: Build macOS arm64 toolchain
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain via Homebrew
        run: |
          brew tap osx-cross/avr
          brew install avr-gcc avr-binutils

      - name: Locate toolchain binaries
        id: locate
        run: |
          AVR_GCC=$(which avr-gcc)
          BIN_DIR=$(dirname "$AVR_GCC")
          echo "bin_dir=$BIN_DIR" >> $GITHUB_OUTPUT
          echo "Found avr-gcc at: $AVR_GCC"
          avr-gcc --version

      - name: Assemble toolchain directory
        run: |
          mkdir -p output/avr-gcc-homebrew-arm64-macos/bin
          BIN_DIR="${{ steps.locate.outputs.bin_dir }}"
          for bin in avr-gcc avr-g++ avr-as avr-ld avr-ar avr-objcopy avr-objdump avr-size avr-nm avr-strip avr-ranlib avr-strings; do
            [ -f "$BIN_DIR/$bin" ] && cp "$BIN_DIR/$bin" output/avr-gcc-homebrew-arm64-macos/bin/ || true
          done
          # Include avr headers from Homebrew sysroot
          SYSROOT=$(brew --prefix avr-gcc)/avr
          if [ -d "$SYSROOT" ]; then
            cp -r "$SYSROOT" output/avr-gcc-homebrew-arm64-macos/avr
          fi

      - name: Upload macOS arm64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-macos-arm64
          path: output/avr-gcc-homebrew-arm64-macos/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # macOS x86_64 — uses Homebrew avr-gcc on Intel runner
  # ---------------------------------------------------------------------------
  build-macos-x64:
    name: Build macOS x86_64 toolchain
    runs-on: macos-13
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain via Homebrew
        run: |
          brew tap osx-cross/avr
          brew install avr-gcc avr-binutils

      - name: Locate toolchain binaries
        id: locate
        run: |
          AVR_GCC=$(which avr-gcc)
          BIN_DIR=$(dirname "$AVR_GCC")
          echo "bin_dir=$BIN_DIR" >> $GITHUB_OUTPUT
          avr-gcc --version

      - name: Assemble toolchain directory
        run: |
          mkdir -p output/avr-gcc-homebrew-x64-macos/bin
          BIN_DIR="${{ steps.locate.outputs.bin_dir }}"
          for bin in avr-gcc avr-g++ avr-as avr-ld avr-ar avr-objcopy avr-objdump avr-size avr-nm avr-strip avr-ranlib avr-strings; do
            [ -f "$BIN_DIR/$bin" ] && cp "$BIN_DIR/$bin" output/avr-gcc-homebrew-x64-macos/bin/ || true
          done
          SYSROOT=$(brew --prefix avr-gcc)/avr
          if [ -d "$SYSROOT" ]; then
            cp -r "$SYSROOT" output/avr-gcc-homebrew-x64-macos/avr
          fi

      - name: Upload macOS x64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-macos-x64
          path: output/avr-gcc-homebrew-x64-macos/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Package wheels (one job per platform, all run in parallel)
  # ---------------------------------------------------------------------------
  package-linux-x64:
    name: Package Linux x64 wheel
    needs: build-linux-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-linux-x64
          path: toolchain/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: manylinux_2_17_x86_64
        run: python -m hatch build --target wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x64
          path: python/dist/*.whl

  package-win-x64:
    name: Package Windows x64 wheel
    needs: build-linux-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-win-x64
          path: toolchain/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: win_amd64
        run: python -m hatch build --target wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-win-x64
          path: python/dist/*.whl

  package-win-x86:
    name: Package Windows x86 wheel
    needs: build-linux-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-win-x86
          path: toolchain/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: win32
        run: python -m hatch build --target wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-win-x86
          path: python/dist/*.whl

  package-macos-arm64:
    name: Package macOS arm64 wheel
    needs: build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-macos-arm64
          path: toolchain/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: macosx_14_0_arm64
        run: python -m hatch build --target wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: python/dist/*.whl

  package-macos-x64:
    name: Package macOS x64 wheel
    needs: build-macos-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-macos-x64
          path: toolchain/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install hatchling
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: macosx_13_0_x86_64
        run: python -m hatch build --target wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-x64
          path: python/dist/*.whl

  # ---------------------------------------------------------------------------
  # Collect, build sdist, smoke-test, and release
  # ---------------------------------------------------------------------------
  collect-and-release:
    name: Collect wheels and create release
    needs:
      - package-linux-x64
      - package-win-x64
      - package-win-x86
      - package-macos-arm64
      - package-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install hatchling

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Build sdist (no binaries)
        working-directory: python/
        run: python -m hatch build --target sdist

      - name: Move sdist to dist/
        run: mv python/dist/*.tar.gz dist/

      - name: Smoke test (Linux wheel)
        run: |
          WHEEL=$(ls dist/pymcu_avr_toolchain-*-manylinux_2_17_x86_64.whl | head -1)
          pip install "$WHEEL" -e python/ --no-deps || pip install "$WHEEL"
          python -c "
          import pymcu_avr_toolchain
          bin_dir = pymcu_avr_toolchain.get_bin_dir()
          print(f'bin_dir: {bin_dir}')
          assert bin_dir.exists(), f'bin_dir does not exist: {bin_dir}'
          avr_gcc = bin_dir / 'avr-gcc'
          assert avr_gcc.exists(), f'avr-gcc not found: {avr_gcc}'
          print('Smoke test passed.')
          "

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          prerelease: ${{ contains(github.ref, 'dev') || contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: |
            ## pymcu-avr-toolchain ${{ github.ref_name }}

            Pre-built AVR GCC toolchain wheels for PyMCU.

            ### Components
            | Component | Version |
            |-----------|---------|
            | avr-gcc | 15.2.0 |
            | Binutils | 2.45 |
            | GDB | 16.3 |
            | AVR-LibC | 2.2.1 |

            ### Platforms
            | Wheel | Platform |
            |-------|----------|
            | `pymcu_avr_toolchain-*-manylinux_2_17_x86_64.whl` | Linux x86_64 |
            | `pymcu_avr_toolchain-*-win_amd64.whl` | Windows 64-bit |
            | `pymcu_avr_toolchain-*-win32.whl` | Windows 32-bit |
            | `pymcu_avr_toolchain-*-macosx_14_0_arm64.whl` | macOS Apple Silicon |
            | `pymcu_avr_toolchain-*-macosx_13_0_x86_64.whl` | macOS Intel |

            ### Install

            ```bash
            pip install pymcu-avr-toolchain \
              --find-links https://github.com/PyMCU/avr-gcc-build/releases/download/${{ github.ref_name }}/
            ```

            Or with PyMCU:
            ```bash
            pip install "pymcu[avr]" pymcu-avr-toolchain \
              --find-links https://github.com/PyMCU/avr-gcc-build/releases/download/${{ github.ref_name }}/
            ```

            ### Verify SHA256 checksums
            See `SHA256SUMS` attached to this release.
