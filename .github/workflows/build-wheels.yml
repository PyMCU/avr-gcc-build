name: Build pymcu-avr-toolchain wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Linux x64: build natively on ubuntu-latest (no Docker).
  # Uploads the Linux toolchain as an artifact so the Windows jobs can reuse it.
  # ---------------------------------------------------------------------------
  build-linux-x64:
    name: Build Linux x64 toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Restore source tarball cache
        uses: actions/cache@v4
        with:
          path: tarball-cache/
          key: avr-sources-v1-${{ hashFiles('avr-gcc-build.sh') }}
          restore-keys: avr-sources-v1-

      - name: Set up wget cache wrapper
        run: |
          mkdir -p tarball-cache
          mkdir -p /tmp/wget-wrap
          cat > /tmp/wget-wrap/wget << 'WRAPPER'
          #!/bin/bash
          URL=""
          for arg in "$@"; do
            case "$arg" in http*|ftp*) URL="$arg" ;; esac
          done
          FILE="$(basename "$URL")"
          CACHE_DIR="${GITHUB_WORKSPACE}/tarball-cache"
          if [ -n "$FILE" ] && [ -f "$CACHE_DIR/$FILE" ]; then
            echo "[wget-cache] Cache hit: $FILE"
            cp "$CACHE_DIR/$FILE" "$FILE"
          else
            /usr/bin/wget "$@"
            if [ -n "$FILE" ] && [ -f "$FILE" ]; then
              cp "$FILE" "$CACHE_DIR/" 2>/dev/null || true
            fi
          fi
          WRAPPER
          chmod +x /tmp/wget-wrap/wget
          echo "/tmp/wget-wrap" >> $GITHUB_PATH

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget make gcc g++ bzip2 xz-utils autoconf texinfo \
            libgmp-dev libmpfr-dev libexpat1-dev

      - name: Build Linux x64 AVR-GCC toolchain
        env:
          FOR_LINUX: "1"
          FOR_WINX64: "0"
          FOR_WINX86: "0"
          JOBCOUNT: "4"
        run: bash avr-gcc-build.sh

      - name: Verify Linux toolchain
        run: |
          LINUX_DIR=$(ls -d build/avr-gcc-*-x64-linux | head -1)
          echo "Found: $LINUX_DIR"
          "$LINUX_DIR/bin/avr-gcc" --version

      - name: Upload Linux x64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-linux-x64
          path: build/avr-gcc-*-x64-linux/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Windows x64: needs the Linux toolchain in PATH for cross-compilation.
  # Runs in parallel with build-win-x86 after build-linux-x64 completes.
  # ---------------------------------------------------------------------------
  build-win-x64:
    name: Build Windows x64 toolchain
    runs-on: ubuntu-latest
    needs: build-linux-x64
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x64 toolchain
        uses: actions/download-artifact@v4
        with:
          name: toolchain-linux-x64
          path: linux-toolchain/

      - name: Add Linux AVR-GCC to PATH
        run: echo "${{ github.workspace }}/linux-toolchain/bin" >> $GITHUB_PATH

      - name: Restore source tarball cache
        uses: actions/cache@v4
        with:
          path: tarball-cache/
          key: avr-sources-v1-${{ hashFiles('avr-gcc-build.sh') }}
          restore-keys: avr-sources-v1-

      - name: Set up wget cache wrapper
        run: |
          mkdir -p tarball-cache
          mkdir -p /tmp/wget-wrap
          cat > /tmp/wget-wrap/wget << 'WRAPPER'
          #!/bin/bash
          URL=""
          for arg in "$@"; do
            case "$arg" in http*|ftp*) URL="$arg" ;; esac
          done
          FILE="$(basename "$URL")"
          CACHE_DIR="${GITHUB_WORKSPACE}/tarball-cache"
          if [ -n "$FILE" ] && [ -f "$CACHE_DIR/$FILE" ]; then
            echo "[wget-cache] Cache hit: $FILE"
            cp "$CACHE_DIR/$FILE" "$FILE"
          else
            /usr/bin/wget "$@"
            if [ -n "$FILE" ] && [ -f "$FILE" ]; then
              cp "$FILE" "$CACHE_DIR/" 2>/dev/null || true
            fi
          fi
          WRAPPER
          chmod +x /tmp/wget-wrap/wget
          echo "/tmp/wget-wrap" >> $GITHUB_PATH

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget make gcc g++ bzip2 xz-utils autoconf texinfo \
            libgmp-dev libmpfr-dev libexpat1-dev mingw-w64

      - name: Build Windows x64 AVR-GCC toolchain
        env:
          FOR_LINUX: "0"
          FOR_WINX64: "1"
          FOR_WINX86: "0"
          JOBCOUNT: "4"
        run: bash avr-gcc-build.sh

      - name: Upload Windows x64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-win-x64
          path: build/avr-gcc-*-x64-windows/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Windows x86: mirrors build-win-x64 but produces 32-bit binaries.
  # Runs in parallel with build-win-x64.
  # ---------------------------------------------------------------------------
  build-win-x86:
    name: Build Windows x86 toolchain
    runs-on: ubuntu-latest
    needs: build-linux-x64
    timeout-minutes: 180
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x64 toolchain
        uses: actions/download-artifact@v4
        with:
          name: toolchain-linux-x64
          path: linux-toolchain/

      - name: Add Linux AVR-GCC to PATH
        run: echo "${{ github.workspace }}/linux-toolchain/bin" >> $GITHUB_PATH

      - name: Restore source tarball cache
        uses: actions/cache@v4
        with:
          path: tarball-cache/
          key: avr-sources-v1-${{ hashFiles('avr-gcc-build.sh') }}
          restore-keys: avr-sources-v1-

      - name: Set up wget cache wrapper
        run: |
          mkdir -p tarball-cache
          mkdir -p /tmp/wget-wrap
          cat > /tmp/wget-wrap/wget << 'WRAPPER'
          #!/bin/bash
          URL=""
          for arg in "$@"; do
            case "$arg" in http*|ftp*) URL="$arg" ;; esac
          done
          FILE="$(basename "$URL")"
          CACHE_DIR="${GITHUB_WORKSPACE}/tarball-cache"
          if [ -n "$FILE" ] && [ -f "$CACHE_DIR/$FILE" ]; then
            echo "[wget-cache] Cache hit: $FILE"
            cp "$CACHE_DIR/$FILE" "$FILE"
          else
            /usr/bin/wget "$@"
            if [ -n "$FILE" ] && [ -f "$FILE" ]; then
              cp "$FILE" "$CACHE_DIR/" 2>/dev/null || true
            fi
          fi
          WRAPPER
          chmod +x /tmp/wget-wrap/wget
          echo "/tmp/wget-wrap" >> $GITHUB_PATH

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget make gcc g++ bzip2 xz-utils autoconf texinfo \
            libgmp-dev libmpfr-dev libexpat1-dev mingw-w64

      - name: Build Windows x86 AVR-GCC toolchain
        env:
          FOR_LINUX: "0"
          FOR_WINX64: "0"
          FOR_WINX86: "1"
          JOBCOUNT: "4"
        run: bash avr-gcc-build.sh

      - name: Upload Windows x86 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-win-x86
          path: build/avr-gcc-*-x86-windows/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # macOS arm64 — native Apple Silicon (macos-14).
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    name: Build macOS arm64 toolchain
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain via Homebrew (arm64)
        run: |
          brew tap osx-cross/avr
          brew install avr-gcc avr-binutils

      - name: Locate arm64 toolchain binaries
        id: locate-arm64
        run: |
          AVR_GCC=$(which avr-gcc)
          BIN_DIR=$(dirname "$AVR_GCC")
          echo "bin_dir=$BIN_DIR" >> $GITHUB_OUTPUT
          echo "Found arm64 avr-gcc at: $AVR_GCC"
          avr-gcc --version

      - name: Assemble arm64 toolchain directory
        run: |
          mkdir -p output/avr-gcc-homebrew-arm64-macos/bin
          BIN_DIR="${{ steps.locate-arm64.outputs.bin_dir }}"
          for bin in avr-gcc avr-g++ avr-as avr-ld avr-ar avr-objcopy avr-objdump avr-size avr-nm avr-strip avr-ranlib avr-strings; do
            [ -f "$BIN_DIR/$bin" ] && cp "$BIN_DIR/$bin" output/avr-gcc-homebrew-arm64-macos/bin/ || true
          done
          SYSROOT=$(brew --prefix avr-gcc)/avr
          if [ -d "$SYSROOT" ]; then
            cp -r "$SYSROOT" output/avr-gcc-homebrew-arm64-macos/avr
          fi

      - name: Upload macOS arm64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-macos-arm64
          path: output/avr-gcc-homebrew-arm64-macos/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # macOS x86_64 — native Intel runner (macos-13), no Rosetta required.
  # Runs in parallel with build-macos-arm64.
  # ---------------------------------------------------------------------------
  build-macos-x64:
    name: Build macOS x86_64 toolchain
    runs-on: macos-13
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install AVR toolchain via Homebrew (x86_64)
        run: |
          brew tap osx-cross/avr
          brew install avr-gcc avr-binutils

      - name: Locate x86_64 toolchain binaries
        id: locate-x64
        run: |
          AVR_GCC=$(which avr-gcc)
          BIN_DIR=$(dirname "$AVR_GCC")
          echo "bin_dir=$BIN_DIR" >> $GITHUB_OUTPUT
          echo "Found x86_64 avr-gcc at: $AVR_GCC"
          avr-gcc --version

      - name: Assemble x86_64 toolchain directory
        run: |
          mkdir -p output/avr-gcc-homebrew-x64-macos/bin
          BIN_DIR="${{ steps.locate-x64.outputs.bin_dir }}"
          for bin in avr-gcc avr-g++ avr-as avr-ld avr-ar avr-objcopy avr-objdump avr-size avr-nm avr-strip avr-ranlib avr-strings; do
            [ -f "$BIN_DIR/$bin" ] && cp "$BIN_DIR/$bin" output/avr-gcc-homebrew-x64-macos/bin/ || true
          done
          SYSROOT=$(brew --prefix avr-gcc)/avr
          if [ -d "$SYSROOT" ]; then
            cp -r "$SYSROOT" output/avr-gcc-homebrew-x64-macos/avr
          fi

      - name: Upload macOS x86_64 toolchain
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-macos-x64
          path: output/avr-gcc-homebrew-x64-macos/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Package wheels (one job per platform, all run in parallel)
  # ---------------------------------------------------------------------------
  package-linux-x64:
    name: Package Linux x64 wheel
    needs: build-linux-x64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-linux-x64
          path: toolchain/
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: manylinux_2_17_x86_64
        run: uv build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-x64
          path: python/dist/*.whl

  package-win-x64:
    name: Package Windows x64 wheel
    needs: build-win-x64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-win-x64
          path: toolchain/
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: win_amd64
        run: uv build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-win-x64
          path: python/dist/*.whl

  package-win-x86:
    name: Package Windows x86 wheel
    needs: build-win-x86
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-win-x86
          path: toolchain/
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: win32
        run: uv build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-win-x86
          path: python/dist/*.whl

  package-macos-arm64:
    name: Package macOS arm64 wheel
    needs: build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-macos-arm64
          path: toolchain/
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: macosx_14_0_arm64
        run: uv build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-arm64
          path: python/dist/*.whl

  package-macos-x64:
    name: Package macOS x86_64 wheel
    needs: build-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: toolchain-macos-x64
          path: toolchain/
      - uses: astral-sh/setup-uv@v6
      - name: Build wheel
        working-directory: python/
        env:
          AVRT_TOOLCHAIN_DIR: ${{ github.workspace }}/toolchain
          WHEEL_PLATFORM_TAG: macosx_13_0_x86_64
        run: uv build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel-macos-x64
          path: python/dist/*.whl

  # ---------------------------------------------------------------------------
  # Collect, build sdist, smoke-test, and release
  # ---------------------------------------------------------------------------
  collect-and-release:
    name: Collect wheels and create release
    needs:
      - package-linux-x64
      - package-win-x64
      - package-win-x86
      - package-macos-arm64
      - package-macos-x64
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Build sdist (no binaries)
        working-directory: python/
        run: uv build --sdist

      - name: Move sdist to dist/
        run: mv python/dist/*.tar.gz dist/

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          retention-days: 1

      - name: Smoke test (Linux wheel)
        run: |
          WHEEL=$(ls dist/pymcu_avr_toolchain-*-manylinux_2_17_x86_64.whl | head -1)
          uv run --with "$WHEEL" python -c "
          import pymcu_avr_toolchain
          bin_dir = pymcu_avr_toolchain.get_bin_dir()
          print(f'bin_dir: {bin_dir}')
          assert bin_dir.exists(), f'bin_dir does not exist: {bin_dir}'
          avr_gcc = bin_dir / 'avr-gcc'
          assert avr_gcc.exists(), f'avr-gcc not found: {avr_gcc}'
          print('Smoke test passed.')
          "

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: List artifacts
        run: ls -lh dist/

      # GitHub Release and public PyPI publishing are intentionally disabled.
      # Enable once the package is ready for public distribution.
      # - name: Create GitHub Release
      #   if: startsWith(github.ref, 'refs/tags/') || inputs.create_release
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: dist/*

  # ---------------------------------------------------------------------------
  # Publish to public PyPI (only on tag or release)
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: dist-sdist
          path: dist/

      - uses: astral-sh/setup-uv@v6

      - name: Publish to PyPI
        run: uv publish dist/

  # ---------------------------------------------------------------------------
  # Publish to private PyPI index via headscale
  # ---------------------------------------------------------------------------
  publish-private:
    name: Publish to private PyPI
    needs: collect-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Connect to headscale network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.HEADSCALE_AUTH_KEY }}
          args: --login-server ${{ secrets.HEADSCALE_URL }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Publish to private registry (Gitea)
        run: |
          uv publish \
            --publish-url "${{ secrets.PRIVATE_PYPI_URL }}" \
            --username "${{ secrets.PRIVATE_PYPI_USERNAME }}" \
            --password "${{ secrets.PRIVATE_PYPI_TOKEN }}" \
            dist/
